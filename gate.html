<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEBIUS — Disclaimer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(180deg, #0C1A3A 0%, #0A3050 40%, #0E3558 100%);
            color: #e6f3ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .gate {
            max-width: 520px;
            width: 100%;
            background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .gate-logo {
            font-size: 2rem;
            font-weight: 700;
            color: #E0FF4F;
            letter-spacing: 2px;
            margin-bottom: 32px;
        }

        .gate-divider {
            width: 60px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            margin: 0 auto 32px;
        }

        .gate-text {
            font-size: 1rem;
            color: #B0CFEA;
            line-height: 1.75;
            margin-bottom: 12px;
        }

        .gate-highlight {
            color: #fbbf24;
            font-weight: 600;
        }

        .gate-text-secondary {
            font-size: 0.9rem;
            color: #5A8AAE;
            line-height: 1.6;
            margin-bottom: 36px;
        }

        .gate-btn {
            display: inline-block;
            background: linear-gradient(135deg, #E0FF4F, #c8e640);
            color: #0C1A3A;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 14px 36px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            letter-spacing: 0.3px;
        }

        .gate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(224, 255, 79, 0.2);
        }

        .gate-footer {
            margin-top: 28px;
            font-size: 0.72rem;
            color: #3A6080;
        }
    </style>
</head>
<body>
    <div class="gate">
        <div class="gate-logo"><img src="nebius_logo.png" alt="Nebius" style="height:40px;width:auto;"></div>
        <div class="gate-divider"></div>
        <p class="gate-text">
            The content presented here are <span class="gate-highlight">minimal viable product (MVP) sample ideas created for demonstration purposes only</span>, using publicly available information.
        </p>
        <p class="gate-text-secondary">
            All content will be removed following the conclusion of the interview process.
        </p>
        <a href="projects.html" class="gate-btn">Acknowledge & Continue</a>
        <div class="gate-footer">© 2026 Rus Teston</div>
    </div>
</body>
</html>
